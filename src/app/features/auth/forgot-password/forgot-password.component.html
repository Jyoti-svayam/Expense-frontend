<div class="auth-page">
  <div class="auth-card">
    <h2>Forgot password</h2>
    <p class="subtitle">Enter your account email. If it exists, we will send a link to create a new password.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <input
          type="email"
          placeholder="Email address"
          formControlName="email"
          [class.invalid]="(submitted || f['email']?.touched) && f['email']?.invalid"
        />
        <small *ngIf="(submitted || f['email']?.touched) && f['email']?.errors?.['required']">
          Email is required
        </small>
        <small *ngIf="(submitted || f['email']?.touched) && f['email']?.errors?.['email']">
          Enter a valid email
        </small>
      </div>

      <button type="submit" class="primary" [disabled]="loading">
        <span *ngIf="loading">Sending…</span>
        <span *ngIf="!loading">Send reset link</span>
      </button>

      <p class="switch">
        <a routerLink="/login">Back to login</a>
      </p>
    </form>
  </div>
</div>
