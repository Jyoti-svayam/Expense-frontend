<div class="auth-page">
  <div class="auth-card">

    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to continue tracking your expenses</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="form-group">
        <input 
          type="email" 
          placeholder="Email Address" 
          formControlName="email"
          [class.invalid]="(submitted || f['email']?.touched) && f['email']?.invalid"
        />

        <small *ngIf="(submitted || f['email']?.touched) && f['email']?.errors?.['required']">
          Email is required
        </small>

        <small *ngIf="(submitted || f['email']?.touched) && f['email']?.errors?.['email']">
          Enter a valid email
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <input 
          type="password" 
          placeholder="Password" 
          formControlName="password"
          [class.invalid]="(submitted || f['password']?.touched) && f['password']?.invalid"
        />

        <small *ngIf="(submitted || f['password']?.touched) && f['password']?.errors?.['required']">
          Password is required
        </small>
      </div>

      <!-- Submit -->
      <button type="submit" class="primary" [disabled]="loading">
        <span *ngIf="loading">Logging in...</span>
        <span *ngIf="!loading">Login</span>
      </button>

      <!-- Footer -->
      <p class="switch">
        Don’t have an account?
        <a routerLink="/signup">Signup</a>
      </p>

    </form>

  </div>
</div>
