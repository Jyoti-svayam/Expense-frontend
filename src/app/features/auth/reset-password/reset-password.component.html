<div class="auth-page">
  <div class="auth-card">
    <h2>Create new password</h2>
    <p class="subtitle">Choose a new password for your account (at least 6 characters).</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <input
          type="password"
          placeholder="New password"
          formControlName="newPassword"
          [class.invalid]="(submitted || f['newPassword']?.touched) && f['newPassword']?.invalid"
        />
        <small *ngIf="(submitted || f['newPassword']?.touched) && f['newPassword']?.errors?.['required']">
          New password is required
        </small>
        <small *ngIf="(submitted || f['newPassword']?.touched) && f['newPassword']?.errors?.['minlength']">
          At least 6 characters
        </small>
      </div>

      <div class="form-group">
        <input
          type="password"
          placeholder="Confirm new password"
          formControlName="confirmPassword"
          [class.invalid]="(submitted || f['confirmPassword']?.touched) && (f['confirmPassword']?.invalid || form.errors?.['mismatch'])"
        />
        <small *ngIf="(submitted || f['confirmPassword']?.touched) && f['confirmPassword']?.errors?.['required']">
          Please confirm your password
        </small>
        <small *ngIf="submitted && form.errors?.['mismatch'] && f['confirmPassword']?.touched">
          Passwords do not match
        </small>
      </div>

      <button type="submit" class="primary" [disabled]="loading">
        <span *ngIf="loading">Saving…</span>
        <span *ngIf="!loading">Save new password</span>
      </button>

      <p class="switch">
        <a routerLink="/login">Back to login</a>
      </p>
    </form>
  </div>
</div>
