<div class="modal-header">
<h2>{{ data ? 'Edit Expense' : 'Add Expense' }}</h2>
  <button class="close-btn" (click)="close()"> ✖ </button>
</div>

<!-- RECEIPT SCANNER -->
<div class="receipt-scanner">
  <label for="receiptUpload" class="scan-btn">
    <mat-icon>receipt_long</mat-icon>
    Scan Receipt
  </label>
  <input 
    type="file" 
    id="receiptUpload" 
    accept="image/*" 
    style="display:none"
    (change)="onReceiptUpload($event)"
  >
  <span *ngIf="scanning" class="scanning-text">
    <mat-icon>hourglass_empty</mat-icon> Scanning...
  </span>
  <span *ngIf="scanned" class="scanned-text">
    <mat-icon>check_circle</mat-icon> Receipt scanned!
  </span>
</div>



<form [formGroup]="form" (ngSubmit)="submit(); $event.preventDefault()">

  <!-- TITLE -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Title</mat-label>
    <input matInput formControlName="title">
  </mat-form-field>
  <small *ngIf="submitted && f['title']?.errors?.['required']">
    Title is required
  </small>
  <small *ngIf="submitted && f['title']?.errors?.['minlength']">
    Min 3 characters required
  </small>







  <!-- AMOUNT -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Amount</mat-label>
    <input matInput type="number" formControlName="amount">
  </mat-form-field>
  <small *ngIf="submitted && f['amount']?.errors">
    Amount is required
  </small>

  <!-- DATE -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Date</mat-label>
    <input matInput type="date" formControlName="date">
  </mat-form-field>


   <!-- VENDOR -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Vendor Name</mat-label>
    <input matInput formControlName="vendor">
  </mat-form-field>


  <!-- CATEGORY -->
  <!-- <mat-form-field appearance="outline" class="full">
    <mat-label>Category</mat-label>
    <mat-select formControlName="category">
      <mat-option value="Food">Food</mat-option>
      <mat-option value="Travel">Travel</mat-option>
      <mat-option value="Shopping">Shopping</mat-option>
      <mat-option value="Bills">Bills</mat-option>
      <mat-option value="Entertainment">Entertainment</mat-option>
    </mat-select>
  </mat-form-field> -->

  
  <mat-form-field appearance="outline" class="full">
  <mat-label>Category</mat-label>

  <mat-select formControlName="category">

    <mat-option 
      *ngFor="let cat of categories" 
      [value]="cat.name">  <!-- 👈 same as your old structure -->

      {{ cat.name }}

    </mat-option>

  </mat-select>
</mat-form-field>

  <!-- PAYMENT -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Payment Mode</mat-label>
    <mat-select formControlName="payment">
      <mat-option value="Cash">Cash</mat-option>
      <mat-option value="UPI">UPI</mat-option>
      <mat-option value="Card">Card</mat-option>
    </mat-select>
  </mat-form-field>

  <!-- CURRENCY -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Currency</mat-label>
    <mat-select formControlName="currency">
      <mat-option value="INR">INR</mat-option>
      <mat-option value="USD">USD</mat-option>
    </mat-select>
  </mat-form-field>

  <!-- NOTES -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Notes</mat-label>
    <textarea matInput formControlName="notes"></textarea>
  </mat-form-field>

  <div class="actions">
    <button mat-stroked-button type="button" (click)="close()">Cancel</button>
   <button mat-raised-button color="primary" type="button" (click)="submit()">
  {{ data ? 'Update' : 'Add Expense' }}
</button>
  </div>

</form>
