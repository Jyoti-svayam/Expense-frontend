<div class="ai-chat-container">
  <div class="chat-header">
    <h3 class="chat-title"><span class="chat-title-icon" aria-hidden="true">✨</span> AI Summary</h3>
    <button type="button" class="close-btn" (click)="closeDialog()" aria-label="Close">✖</button>
  </div>

  <div class="chat-messages" #scrollMe role="log" aria-live="polite">
    <div *ngFor="let msg of messages" [ngClass]="msg.role === 'user' ? 'user-msg' : 'ai-msg'">
      <p>{{ msg.text }}</p>
    </div>
    <div *ngIf="loading" class="ai-msg">
      <p>⏳ Thinking...</p>
    </div>
  </div>

  <div class="chat-input">
    <input
      type="text"
      class="chat-input-field"
      [(ngModel)]="userMessage"
      placeholder="Ask about your expenses..."
      (keyup.enter)="sendMessage()"
      aria-label="Message to AI" />
    <button type="button" class="send-btn" (click)="sendMessage()">Send</button>
  </div>
</div>
