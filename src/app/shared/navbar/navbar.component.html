<nav class="navbar">

  <h2 class="brand" routerLink="">ExpenseTracker</h2>

  <div class="right-links">

    <button
      mat-stroked-button
      type="button"
      class="theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'">
      <mat-icon>{{ isDarkTheme ? 'light_mode' : 'dark_mode' }}</mat-icon>
      <span class="theme-label">{{ isDarkTheme ? 'Light' : 'Dark' }}</span>
    </button>

    <a class="links" routerLink="/">Home</a>

    <div *ngIf="dashboardHidden()">
      <a class="links" (click)="goToDashBoard()" routerLink="/dashboard">
        Dashboard
      </a>
    </div>


    <ng-container *ngIf="showProfileMenu()">
      <div class="profile-wrapper" [matMenuTriggerFor]="profileMenu">
        <div class="profile-box">
          <mat-icon>account_circle</mat-icon>
          <span>{{ userName }}</span>
          <mat-icon>arrow_drop_down</mat-icon>
        </div>
      </div>

      <mat-menu #profileMenu="matMenu">
        <button mat-menu-item (click)="goToProfile()">
          <mat-icon>person</mat-icon>
          <span>My Profile</span>
        </button>

        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </ng-container>

  </div>

</nav>
